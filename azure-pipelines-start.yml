schedules:
  - cron: "0 1 * * 1-5"
    displayName: Start AKS cluster at 9am SGT Mon-Fri
    branches:
      include: [ main ]
    always: true

trigger: none

variables:
  - group: maison-aura-vars

pool:
  name: Bazooka-Desktop

jobs:
  - job: StartCluster
    displayName: Start AKS cluster
    steps:
      - task: AzureCLI@2
        displayName: Start AKS
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az aks start \
              --name $(AKS_CLUSTER_NAME) \
              --resource-group $(AKS_RESOURCE_GROUP)
            echo "AKS cluster started successfully"
