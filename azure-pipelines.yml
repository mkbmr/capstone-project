trigger:
  branches:
    include:
      - main

variables:
  - group: maison-aura-vars   # Create this variable group in Azure DevOps (see setup notes below)
  - name: imageTag
    value: $(Build.BuildId)

pool:
  vmImage: ubuntu-latest

# ── Variable group (maison-aura-vars) must contain: ──────────────────────────
# AZURE_SERVICE_CONNECTION  — Azure DevOps service connection name
# ACR_NAME                  — e.g. maisonauraacr
# AKS_RESOURCE_GROUP        — e.g. maison-aura-rg
# AKS_CLUSTER_NAME          — e.g. maison-aura-aks
# KEY_VAULT_NAME            — e.g. maisonaura-kv
# TENANT_ID                 — Azure AD tenant ID (from: az account show)
# KEYVAULT_CLIENT_ID        — output from: terraform output keyvault_client_id
# ─────────────────────────────────────────────────────────────────────────────

stages:

# ── Stage 1: Security Scanning ────────────────────────────────────────────────
  - stage: SecurityScan
    displayName: Security Scan
    jobs:
      - job: DependencyAudit
        displayName: npm audit (frontend + backend)
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: |
              echo "=== Backend dependency audit ==="
              cd my-api
              npm ci --omit=dev
              npm audit --audit-level=high
            displayName: Audit backend dependencies

          - script: |
              echo "=== Frontend dependency audit ==="
              cd my-react-app
              npm ci
              npm audit --audit-level=high
            displayName: Audit frontend dependencies

      - job: IaCScan
        displayName: Checkov IaC security scan
        steps:
          - script: pip install checkov
            displayName: Install Checkov

          - script: |
              echo "=== Terraform scan ==="
              checkov -d infra/terraform --soft-fail --compact
            displayName: Scan Terraform

          - script: |
              echo "=== Kubernetes manifests scan ==="
              checkov -d infra/k8s --soft-fail --compact
            displayName: Scan K8s manifests

# ── Stage 2: Build & Image Scan ───────────────────────────────────────────────
  - stage: Build
    displayName: Build Images
    dependsOn: SecurityScan
    variables:
      ACR_LOGIN_SERVER: $(ACR_NAME).azurecr.io
    jobs:
      - job: BuildImages
        displayName: Build Docker images and scan with Trivy
        steps:
          - task: AzureCLI@2
            displayName: Login to ACR
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az acr login --name $(ACR_NAME)

          - script: |
              docker build \
                -t $(ACR_LOGIN_SERVER)/maison-aura-api:$(imageTag) \
                ./my-api
            displayName: Build API image

          - script: |
              docker build \
                --build-arg NGINX_CONF=nginx.aks.conf \
                -t $(ACR_LOGIN_SERVER)/maison-aura-frontend:$(imageTag) \
                ./my-react-app
            displayName: Build Frontend image (AKS nginx config)

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              echo "=== Scanning API image ==="
              trivy image --exit-code 1 --severity HIGH,CRITICAL \
                --no-progress $(ACR_LOGIN_SERVER)/maison-aura-api:$(imageTag)
              echo "=== Scanning Frontend image ==="
              trivy image --exit-code 1 --severity HIGH,CRITICAL \
                --no-progress $(ACR_LOGIN_SERVER)/maison-aura-frontend:$(imageTag)
            displayName: Trivy vulnerability scan

          - script: |
              docker push $(ACR_LOGIN_SERVER)/maison-aura-api:$(imageTag)
              docker push $(ACR_LOGIN_SERVER)/maison-aura-frontend:$(imageTag)
            displayName: Push images to ACR
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

# ── Stage 3: Deploy to AKS ────────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to AKS
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      ACR_LOGIN_SERVER: $(ACR_NAME).azurecr.io
    jobs:
      - deployment: DeployAKS
        displayName: Deploy to AKS
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Get AKS credentials
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(AKS_RESOURCE_GROUP) \
                        --name $(AKS_CLUSTER_NAME) \
                        --overwrite-existing

                - task: AzureCLI@2
                  displayName: Install nginx Ingress Controller (if not present)
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      if ! helm repo list | grep -q ingress-nginx; then
                        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
                        helm repo update
                      fi
                      helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
                        --namespace ingress-nginx --create-namespace \
                        --set controller.replicaCount=1 \
                        --wait

                - script: |
                    # Substitute placeholders in manifests
                    sed -i "s|__ACR_LOGIN_SERVER__|$(ACR_LOGIN_SERVER)|g" infra/k8s/*.yaml
                    sed -i "s|__BUILD_ID__|$(imageTag)|g"                 infra/k8s/*.yaml
                    sed -i "s|__KEY_VAULT_NAME__|$(KEY_VAULT_NAME)|g"     infra/k8s/*.yaml
                    sed -i "s|__TENANT_ID__|$(TENANT_ID)|g"               infra/k8s/*.yaml
                    sed -i "s|__KEYVAULT_CLIENT_ID__|$(KEYVAULT_CLIENT_ID)|g" infra/k8s/*.yaml
                  displayName: Substitute manifest placeholders

                - script: |
                    kubectl apply -f infra/k8s/namespace.yaml
                    kubectl apply -f infra/k8s/secret-provider.yaml
                    kubectl apply -f infra/k8s/api-service.yaml
                    kubectl apply -f infra/k8s/api-deployment.yaml
                    kubectl apply -f infra/k8s/frontend-service.yaml
                    kubectl apply -f infra/k8s/frontend-deployment.yaml
                    kubectl apply -f infra/k8s/ingress.yaml
                  displayName: Apply Kubernetes manifests

                - script: |
                    kubectl rollout status deployment/maison-aura-api      -n maison-aura --timeout=120s
                    kubectl rollout status deployment/maison-aura-frontend -n maison-aura --timeout=120s
                  displayName: Wait for rollout

                - task: AzureCLI@2
                  displayName: Print external IP
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "=== Ingress external IP ==="
                      kubectl get ingress maison-aura-ingress -n maison-aura
