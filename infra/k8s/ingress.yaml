apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maison-aura-ingress
  namespace: maison-aura
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __APP_DOMAIN__
      secretName: maison-aura-tls
  rules:
    - host: __APP_DOMAIN__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: maison-aura-api
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maison-aura-frontend
                port:
                  number: 80
