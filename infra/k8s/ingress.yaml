apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maison-aura-ingress
  namespace: maison-aura
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: maison-aura-api
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maison-aura-frontend
                port:
                  number: 80
