apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: maison-aura-secrets
  namespace: maison-aura
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "__KEYVAULT_CLIENT_ID__"
    keyvaultName: "__KEY_VAULT_NAME__"
    tenantId: "__TENANT_ID__"
    objects: |
      array:
        - |
          objectName: STRIPE-SECRET-KEY
          objectType: secret
        - |
          objectName: STRIPE-WEBHOOK-SECRET
          objectType: secret
        - |
          objectName: DB-SERVER
          objectType: secret
        - |
          objectName: DB-NAME
          objectType: secret
        - |
          objectName: DB-USER
          objectType: secret
        - |
          objectName: DB-PASSWORD
          objectType: secret
        - |
          objectName: ADMIN-EMAIL
          objectType: secret
        - |
          objectName: ADMIN-PASSWORD
          objectType: secret
        - |
          objectName: ADMIN-SECRET
          objectType: secret
        - |
          objectName: AZURE-STORAGE-CONNECTION-STRING
          objectType: secret
        - |
          objectName: AZURE-STORAGE-CONTAINER
          objectType: secret
  secretObjects:
    - secretName: maison-aura-api-secrets
      type: Opaque
      data:
        - objectName: STRIPE-SECRET-KEY
          key: STRIPE_SECRET_KEY
        - objectName: STRIPE-WEBHOOK-SECRET
          key: STRIPE_WEBHOOK_SECRET
        - objectName: DB-SERVER
          key: DB_SERVER
        - objectName: DB-NAME
          key: DB_NAME
        - objectName: DB-USER
          key: DB_USER
        - objectName: DB-PASSWORD
          key: DB_PASSWORD
        - objectName: ADMIN-EMAIL
          key: ADMIN_EMAIL
        - objectName: ADMIN-PASSWORD
          key: ADMIN_PASSWORD
        - objectName: ADMIN-SECRET
          key: ADMIN_SECRET
        - objectName: AZURE-STORAGE-CONNECTION-STRING
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: AZURE-STORAGE-CONTAINER
          key: AZURE_STORAGE_CONTAINER
