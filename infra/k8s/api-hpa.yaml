apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maison-aura-api-hpa
  namespace: maison-aura
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maison-aura-api
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
