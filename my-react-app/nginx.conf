server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so the upstream is resolved at request time,
    # not at startup — prevents nginx from crashing if the api container
    # isn't ready yet when the frontend container starts.
    resolver 127.0.0.11 valid=10s;
    set $backend http://api:5000;

    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
